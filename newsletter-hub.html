<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📬 Julia 的電子報主頁面</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Helvetica Neue', 'PingFang TC', Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.site-header {
  background: linear-gradient(135deg, #0d1b4e 0%, #1e3a8a 50%, #1d4ed8 100%);
  padding: 40px 0 0;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px;
}
.logo-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 6px;
}
.logo-icon { font-size: 36px; }
.logo-text h1 { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: .3px; }
.logo-text p { font-size: 13px; color: #93c5fd; margin-top: 2px; }
.stats-row {
  display: flex;
  gap: 28px;
  margin: 20px 0 0;
  border-top: 1px solid rgba(255,255,255,.1);
  padding-top: 16px;
}
.stat-item { text-align: center; }
.stat-item .num { font-size: 22px; font-weight: 800; color: #60a5fa; }
.stat-item .label { font-size: 11px; color: #93c5fd; margin-top: 2px; }

/* ===== SEARCH BAR ===== */
.search-section {
  background: #1e293b;
  padding: 24px 0;
  border-bottom: 1px solid #334155;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,.4);
}
.search-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.search-box {
  flex: 1;
  position: relative;
}
.search-box input {
  width: 100%;
  background: #0f172a;
  border: 1px solid #475569;
  border-radius: 10px;
  padding: 12px 16px 12px 44px;
  color: #e2e8f0;
  font-size: 14px;
  outline: none;
  transition: .2s;
}
.search-box input::placeholder { color: #64748b; }
.search-box input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #64748b;
  font-size: 16px;
}
.search-count {
  color: #64748b;
  font-size: 13px;
  white-space: nowrap;
  min-width: 80px;
  text-align: right;
}

/* ===== TOPIC TABS ===== */
.tabs-section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 32px 0;
}
.tabs-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.tab-btn {
  padding: 9px 20px;
  border-radius: 30px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #94a3b8;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: .2s;
  display: flex;
  align-items: center;
  gap: 7px;
}
.tab-btn .count-badge {
  background: #334155;
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 11px;
  font-weight: 700;
}
.tab-btn:hover { border-color: #475569; color: #e2e8f0; }
.tab-btn.active-all { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
.tab-btn.active-all .count-badge { background: rgba(255,255,255,.2); }
.tab-btn.active-ai { background: #1e40af; border-color: #3b82f6; color: #fff; }
.tab-btn.active-ai .count-badge { background: rgba(255,255,255,.2); }
.tab-btn.active-tech { background: #5b21b6; border-color: #7c3aed; color: #fff; }
.tab-btn.active-tech .count-badge { background: rgba(255,255,255,.2); }
.tab-btn.active-esg { background: #065f46; border-color: #16a34a; color: #fff; }
.tab-btn.active-esg .count-badge { background: rgba(255,255,255,.2); }

/* ===== DATE GROUP ===== */
.date-group { margin-bottom: 36px; }
.date-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.date-label {
  font-size: 12px;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  white-space: nowrap;
}
.date-line { flex: 1; height: 1px; background: #1e293b; }

/* ===== NEWSLETTER CARD ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.nl-card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: .25s;
  display: block;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
}
.nl-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.nl-card.topic-ai::before { background: linear-gradient(90deg, #1d4ed8, #60a5fa); }
.nl-card.topic-tech::before { background: linear-gradient(90deg, #7c3aed, #c4b5fd); }
.nl-card.topic-esg::before { background: linear-gradient(90deg, #16a34a, #4ade80); }
.nl-card:hover { border-color: #475569; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.nl-card:hover.topic-ai { border-color: #3b82f6; }
.nl-card:hover.topic-tech { border-color: #7c3aed; }
.nl-card:hover.topic-esg { border-color: #16a34a; }

.card-topic-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
}
.tag-ai { background: rgba(29,78,216,.25); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
.tag-tech { background: rgba(124,58,237,.25); color: #c4b5fd; border: 1px solid rgba(124,58,237,.3); }
.tag-esg { background: rgba(22,163,74,.25); color: #6ee7b7; border: 1px solid rgba(22,163,74,.3); }

.card-title { font-size: 16px; font-weight: 700; color: #f1f5f9; line-height: 1.4; margin-bottom: 10px; }
.card-summary { font-size: 13px; color: #94a3b8; line-height: 1.7; margin-bottom: 14px; }
.card-highlights { margin-bottom: 14px; }
.card-highlight-item {
  font-size: 12px;
  color: #64748b;
  padding: 4px 0;
  border-bottom: 1px solid #0f172a;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.card-highlight-item:last-child { border-bottom: none; }
.card-highlight-item .dot { color: #475569; margin-top: 1px; flex-shrink: 0; }
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-date { font-size: 11px; color: #475569; }
.card-arrow { font-size: 14px; color: #475569; transition: .2s; }
.nl-card:hover .card-arrow { color: #94a3b8; transform: translateX(3px); }

/* ===== KEYWORD HIGHLIGHT ===== */
.highlight { background: #fbbf24; color: #000; border-radius: 3px; padding: 0 2px; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #475569;
  grid-column: 1 / -1;
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ===== MAIN CONTENT ===== */
.main-content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px 60px;
}

/* ===== FOOTER ===== */
.site-footer {
  background: #0d1b4e;
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: #475569;
  border-top: 1px solid #1e293b;
}
.site-footer span { color: #60a5fa; }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .header-inner, .search-inner, .tabs-section, .main-content { padding: 0 16px; }
  .stats-row { gap: 16px; }
  .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="site-header">
  <div class="header-inner">
    <div class="logo-row">
      <div class="logo-icon">📬</div>
      <div class="logo-text">
        <h1>Julia 的電子報歸檔主頁</h1>
        <p>AI工具 × 科技資安 × ESG永續 — 每日新聞速遞存檔</p>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-item">
        <div class="num" id="total-count">3</div>
        <div class="label">本月電子報</div>
      </div>
      <div class="stat-item">
        <div class="num" id="ai-count">1</div>
        <div class="label">🤖 AI工具</div>
      </div>
      <div class="stat-item">
        <div class="num" id="tech-count">1</div>
        <div class="label">🔐 科技資安</div>
      </div>
      <div class="stat-item">
        <div class="num" id="esg-count">1</div>
        <div class="label">🌱 ESG永續</div>
      </div>
    </div>
  </div>
</div>

<!-- SEARCH BAR -->
<div class="search-section">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋關鍵字（如：MCP、CSRD、IBM、GPT-5...）" oninput="filterCards()" />
    </div>
    <div class="search-count" id="search-count"></div>
  </div>
</div>

<!-- TABS + CONTENT -->
<div class="tabs-section">
  <div class="tabs-row">
    <button class="tab-btn active-all" onclick="filterTopic('all', this)">
      全部 <span class="count-badge" id="badge-all">3</span>
    </button>
    <button class="tab-btn" onclick="filterTopic('ai', this)">
      🤖 AI工具 &amp; Workflow <span class="count-badge" id="badge-ai">1</span>
    </button>
    <button class="tab-btn" onclick="filterTopic('tech', this)">
      🔐 科技資安 <span class="count-badge" id="badge-tech">1</span>
    </button>
    <button class="tab-btn" onclick="filterTopic('esg', this)">
      🌱 ESG永續 <span class="count-badge" id="badge-esg">1</span>
    </button>
  </div>
</div>

<!-- MAIN CARDS -->
<div class="main-content">
  <div id="cards-container"></div>
</div>

<div class="site-footer">
  <span>Julia 的每日新聞速遞</span> — 由 Claude AI 自動整理與歸檔<br>
  <span style="color:#334155;margin-top:4px;display:block;">新增每日電子報後，請將資料加入下方 NEWSLETTER_DATA 陣列</span>
</div>

<script>
const NEWSLETTER_DATA = [
  {
    id: "ai-20260423",
    date: "2026-04-23",
    dateDisplay: "2026年4月23日",
    topic: "ai",
    topicLabel: "🤖 AI工具 & Workflow",
    title: "Claude Opus 4.7 & GPT-5.4 發布、MCP 突破 9700 萬次安裝",
    summary: "本期聚焦最新模型發布與 MCP 協議里程碑，涵蓋 Taskade Genesis、Great Question、OpenArt 等平台的重大更新。",
    highlights: [
      "Claude Opus 4.7 & GPT-5.4 發布，Agent 工作流能力大躍升",
      "MCP 協議突破 9700 萬次安裝，AI 自動化進入標準化時代",
      "OpenArt 榮登 2026 最佳全方位 AI 創意工具",
      "Great Question 支援 MCP，研究流程全面 AI 化",
      "Veo 3 可從文字提示生成電影質感影片"
    ],
    file: "newsletter-ai-tools-20260423.html",
    keywords: ["Claude", "GPT-5.4", "MCP", "Taskade", "OpenArt", "Veo", "ElevenLabs", "workflow", "automation", "Agentic"]
  },
  {
    id: "tech-20260423",
    date: "2026-04-23",
    dateDisplay: "2026年4月23日",
    topic: "tech",
    topicLabel: "🔐 科技資安",
    title: "IBM 推 Agentic AI 防禦框架、北韓駭客供應鏈攻擊 Axios",
    summary: "本期焦點：IBM 發布針對 AI 代理化攻擊的全新資安評估框架，Anthropic Project Glasswing 多供應商合作計畫浮出水面，開源生態系遭受多起重大攻擊。",
    highlights: [
      "IBM 宣布 Agentic AI 攻擊防禦新措施",
      "Anthropic Project Glasswing 多供應商資安計畫啟動",
      "北韓駭客透過 Axios 供應鏈攻擊影響數百萬用戶",
      "Mercor AI 平台遭 LiteLLM 相關漏洞攻擊並勒索",
      "Agentic 系統可自動壓制警報、秒速運行調查"
    ],
    file: "newsletter-tech-security-20260423.html",
    keywords: ["IBM", "Agentic", "資安", "cybersecurity", "供應鏈", "Glasswing", "北韓", "Axios", "LiteLLM", "Mercor", "勒索"]
  },
  {
    id: "esg-20260423",
    date: "2026-04-23",
    dateDisplay: "2026年4月23日",
    topic: "esg",
    topicLabel: "🌱 ESG永續",
    title: "750+ 企業聯名要求 ISSB 強制自然揭露、CSRD 縮水 85-90%",
    summary: "地球日前夕，ISSB 自然揭露標準之爭引爆全球關注；歐盟 CSRD Omnibus 改革大幅縮減申報範疇；Q1 綠債發行量有望突破 1 兆美元里程碑。",
    highlights: [
      "750+ 企業聯名要求 ISSB 制定強制自然揭露標準",
      "CSRD Omnibus 改革使申報企業減少 85-90%，延至 2028",
      "ISSB 框架已獲 36 個司法管轄區採用（逾 50% 全球 GDP）",
      "Q1 2026 綠債發行有望突破 1 兆美元",
      "Green Monetary Policy 推動央行發行綠色數位貨幣"
    ],
    file: "newsletter-esg-20260423.html",
    keywords: ["ISSB", "CSRD", "ESG", "自然揭露", "綠債", "碳定價", "CBAM", "Omnibus", "確信", "永續", "地球日", "GMP"]
  }
];

let currentTopic = 'all';
let currentSearch = '';

function renderCards() {
  const container = document.getElementById('cards-container');
  const q = currentSearch.toLowerCase().trim();

  let filtered = NEWSLETTER_DATA.filter(item => {
    const topicOk = currentTopic === 'all' || item.topic === currentTopic;
    if (!topicOk) return false;
    if (!q) return true;
    const searchable = [
      item.title, item.summary,
      ...(item.highlights || []),
      ...(item.keywords || [])
    ].join(' ').toLowerCase();
    return searchable.includes(q);
  });

  filtered.sort((a, b) => b.date.localeCompare(a.date));

  const countEl = document.getElementById('search-count');
  if (q) {
    countEl.textContent = `找到 ${filtered.length} 則`;
  } else {
    countEl.textContent = `共 ${filtered.length} 則`;
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="cards-grid">
        <div class="empty-state">
          <div class="empty-icon">🔎</div>
          <p>找不到符合「${q}」的新聞，請試試其他關鍵字</p>
        </div>
      </div>`;
    return;
  }

  const byDate = {};
  filtered.forEach(item => {
    if (!byDate[item.date]) byDate[item.date] = [];
    byDate[item.date].push(item);
  });

  const tagMap = { ai: 'tag-ai', tech: 'tag-tech', esg: 'tag-esg' };

  let html = '';
  Object.keys(byDate).sort().reverse().forEach(date => {
    const items = byDate[date];
    const displayDate = items[0].dateDisplay;
    html += `
      <div class="date-group" data-date="${date}">
        <div class="date-header">
          <div class="date-label">📅 ${displayDate}</div>
          <div class="date-line"></div>
          <div style="font-size:11px;color:#475569;white-space:nowrap;">${items.length} 篇</div>
        </div>
        <div class="cards-grid">`;

    items.forEach(item => {
      const hi = (text) => q ? text.replace(new RegExp(`(${escapeRegex(q)})`, 'gi'), '<span class="highlight">$1</span>') : text;
      const hlItems = (item.highlights || []).map(h =>
        `<div class="card-highlight-item"><span class="dot">▪</span><span>${hi(h)}</span></div>`
      ).join('');

      html += `
        <a class="nl-card topic-${item.topic}" href="${item.file}">
          <div class="card-topic-tag ${tagMap[item.topic]}">${item.topicLabel}</div>
          <div class="card-title">${hi(item.title)}</div>
          <div class="card-summary">${hi(item.summary)}</div>
          <div class="card-highlights">${hlItems}</div>
          <div class="card-footer">
            <div class="card-date">${item.dateDisplay}</div>
            <div class="card-arrow">→</div>
          </div>
        </a>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function filterTopic(topic, btn) {
  currentTopic = topic;
  document.querySelectorAll('.tab-btn').forEach(b => { b.className = 'tab-btn'; });
  const classMap = { all: 'active-all', ai: 'active-ai', tech: 'active-tech', esg: 'active-esg' };
  btn.classList.add(classMap[topic]);
  renderCards();
}

function filterCards() {
  currentSearch = document.getElementById('search-input').value;
  renderCards();
}

function updateStats() {
  const total = NEWSLETTER_DATA.length;
  const aiCount = NEWSLETTER_DATA.filter(d => d.topic === 'ai').length;
  const techCount = NEWSLETTER_DATA.filter(d => d.topic === 'tech').length;
  const esgCount = NEWSLETTER_DATA.filter(d => d.topic === 'esg').length;
  document.getElementById('total-count').textContent = total;
  document.getElementById('ai-count').textContent = aiCount;
  document.getElementById('tech-count').textContent = techCount;
  document.getElementById('esg-count').textContent = esgCount;
  document.getElementById('badge-all').textContent = total;
  document.getElementById('badge-ai').textContent = aiCount;
  document.getElementById('badge-tech').textContent = techCount;
  document.getElementById('badge-esg').textContent = esgCount;
}

updateStats();
renderCards();
document.getElementById('search-count').textContent = `共 ${NEWSLETTER_DATA.length} 則`;
</script>
</body>
</html>
